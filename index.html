<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIFdumpster</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --amber: #f5a623;
    --mono:  "Share Tech Mono", monospace;
    --sans:  "Barlow Condensed", sans-serif;
  }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: var(--mono);
  }

  /* scanlines */
  body::after {
    content: "";
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── PRELOADER ──────────────────────────────────────────────────── */
  #preloader {
    position: fixed; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.9s ease;
    background: #000;
  }
  #preloader.fade-out {
    opacity: 0;
    pointer-events: none;
  }

  /* ── SCENE ─────────────────────────────────────────────────────── */
  .scene {
    position: relative;
    width: min(480px, 84vw);
  }

  /* Clip container — cards are only visible inside this,
     which sits above the truck body. Cards fall through
     the opening and vanish behind the truck naturally. */
  .card-stage {
    position: absolute;
    inset: 0;
    /* Clip to just the upper portion where the clapperboard mouth is.
       Cards are visible from top down to ~52% of truck height,
       below that they're hidden — as if swallowed by the truck. */
    clip-path: inset(0 0 48% 0);
    z-index: 25;
    pointer-events: none;
  }

  .truck {
    width: 100%;
    display: block;
    position: relative;
    z-index: 20;   /* always on top of everything */
    filter: drop-shadow(0 20px 50px rgba(0,0,0,0.9));
    transform-origin: center bottom;
  }

  /* Front overlay — same image, clipped to lower body only.
     Sits above the card layer so cards vanish "into" the opening. */
  .truck-front {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    display: block;
    z-index: 30;
    clip-path: inset(31% 0 0 0);
    pointer-events: none;
    transform-origin: center bottom;
  }

  .truck.bouncing,
  .truck-front.bouncing {
    animation: truckBounce 0.6s cubic-bezier(0.36,0.07,0.19,0.97) forwards;
  }
  @keyframes truckBounce {
    0%   { transform: translateY(0) scaleY(1) scaleX(1); }
    15%  { transform: translateY(7px) scaleY(0.95) scaleX(1.02); }
    35%  { transform: translateY(-12px) scaleY(1.04) scaleX(0.98); }
    52%  { transform: translateY(5px) scaleY(0.97) scaleX(1.01); }
    68%  { transform: translateY(-5px) scaleY(1.02) scaleX(0.99); }
    84%  { transform: translateY(2px) scaleY(0.99) scaleX(1); }
    100% { transform: translateY(0) scaleY(1) scaleX(1); }
  }

  /* ── FRAME CARDS ────────────────────────────────────────────────── */
  .frame-card {
    position: absolute;
    width: 76px;
    height: 54px;
    background: #16181f;
    border: 1.5px solid rgba(245,166,35,0.6);
    border-radius: 3px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    font-family: var(--mono);
    color: var(--amber);
    box-shadow: 0 4px 20px rgba(0,0,0,0.6), 0 0 10px rgba(245,166,35,0.15);
    opacity: 0;
    pointer-events: none;
  }

  /* colored top stripe */
  .frame-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 2px 2px 0 0;
    background: var(--cc, var(--amber));
  }

  .card-icon { font-size: 15px; line-height: 1; }
  .card-name {
    font-size: 7px;
    opacity: 0.75;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 68px;
    text-align: center;
    letter-spacing: 0.02em;
  }
  .card-bar {
    width: 38px; height: 2px;
    background: var(--cc, var(--amber));
    opacity: 0.25;
    border-radius: 1px;
  }

  /* ── DROP ANIMATION ─────────────────────────────────────────────── */
  @keyframes cardDrop {
    0%   {
      opacity: 0;
      transform: translate(var(--tx), var(--start-y)) rotate(var(--r0)) scale(0.8);
    }
    6%   { opacity: 1; }
    65%  {
      transform: translate(var(--tx), var(--end-y)) rotate(var(--r1)) scale(1.02);
    }
    75%  {
      transform: translate(var(--tx), calc(var(--end-y) + 5px)) rotate(var(--r1)) scale(0.98);
    }
    85%  {
      transform: translate(var(--tx), calc(var(--end-y) - 2px)) rotate(var(--r1)) scale(1.01);
    }
    100% {
      opacity: 1;
      transform: translate(var(--tx), var(--end-y)) rotate(var(--r1)) scale(1);
    }
  }

  .frame-card.dropping {
    animation: cardDrop 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  /* ── PROGRESS DOTS ─────────────────────────────────────────────── */
  .progress-dots {
    display: flex; gap: 8px;
    margin-top: 24px;
    opacity: 0;
    transition: opacity 0.5s;
  }
  .progress-dots.show { opacity: 1; }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(245,166,35,0.15);
    border: 1px solid rgba(245,166,35,0.25);
    transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
  }
  .dot.lit {
    background: var(--amber);
    border-color: var(--amber);
    box-shadow: 0 0 8px rgba(245,166,35,0.6);
  }

  /* ── TAGLINE ────────────────────────────────────────────────────── */
  .tagline {
    margin-top: 22px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(245,166,35,0.4);
    text-align: center;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .tagline.show { opacity: 1; transform: translateY(0); }

  /* ── ENTER BUTTON ───────────────────────────────────────────────── */
  .enter-btn {
    display: inline-block;
    margin-top: 24px;
    padding: 13px 44px;
    background: transparent;
    border: 1px solid var(--amber);
    color: var(--amber);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.5s ease, transform 0.5s ease,
                background 0.2s, color 0.2s, box-shadow 0.2s;
  }
  .enter-btn.show {
    opacity: 1;
    transform: translateY(0);
    animation: btnGlow 2.5s ease-in-out 0.4s infinite;
  }
  .enter-btn:hover {
    background: var(--amber);
    color: #000;
    box-shadow: 0 0 36px rgba(245,166,35,0.45);
    animation: none;
  }
  @keyframes btnGlow {
    0%,100% { box-shadow: 0 0 0 rgba(245,166,35,0); }
    50%      { box-shadow: 0 0 18px rgba(245,166,35,0.3); }
  }

  /* ── TOOL IFRAME ────────────────────────────────────────────────── */
  #app-frame {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    border: none;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
    z-index: 50;
  }
  #app-frame.show {
    opacity: 1;
    pointer-events: all;
  }
</style>
</head>

<script>
// ── CARD DEFINITIONS ──────────────────────────────────────────────────────
const CARDS = [
  { name: 'catloop.gif',   icon: '🐱', color: '#ff6b6b' },
  { name: 'reaction.gif',  icon: '😂', color: '#4ecdc4' },
  { name: 'meme.gif',      icon: '🔥', color: '#f5a623' },
  { name: 'dance.gif',     icon: '💃', color: '#a78bfa' },
  { name: 'explosion.gif', icon: '💥', color: '#f87171' },
  { name: 'vibing.gif',    icon: '🎵', color: '#34d399' },
];

// Positions as % of scene width, end-Y as % of scene height
// Cards drop from above the scene (negative start-y) into the truck body area
const SLOTS = [
  { leftPct: 8,  endYPct: 28, r0:  '-9deg', r1: '-5deg', delay: 0    },
  { leftPct: 28, endYPct: 24, r0:  '7deg',  r1:  '4deg', delay: 360  },
  { leftPct: 50, endYPct: 30, r0:  '-5deg', r1: '-7deg', delay: 700  },
  { leftPct: 14, endYPct: 18, r0:  '11deg', r1:  '8deg', delay: 1030 },
  { leftPct: 38, endYPct: 22, r0:  '-7deg', r1: '-4deg', delay: 1340 },
  { leftPct: 46, endYPct: 26, r0:  '6deg',  r1:  '9deg', delay: 1640 },
];

const scene     = document.getElementById('scene');
const cardStage = document.getElementById('cardStage');
const truck     = document.getElementById('truck');
const dotsWrap = document.getElementById('dots');
const tagline  = document.getElementById('tagline');
const enterBtn = document.getElementById('enterBtn');
const dotEls   = Array.from(document.querySelectorAll('.dot'));

function spawnCard(cardData, slot, index) {
  const sceneW = scene.offsetWidth;
  const sceneH = scene.offsetHeight;

  const card = document.createElement('div');
  card.className = 'frame-card';
  card.style.setProperty('--cc', cardData.color);

  // Position: left edge at slot.leftPct% of scene width
  const leftPx = (slot.leftPct / 100) * sceneW;
  const endYPx = (slot.endYPct / 100) * sceneH;
  const startYPx = -100; // above scene

  // We use CSS vars for the animation translate
  card.style.setProperty('--tx', leftPx + 'px');
  card.style.setProperty('--start-y', startYPx + 'px');
  card.style.setProperty('--end-y', endYPx + 'px');
  card.style.setProperty('--r0', slot.r0);
  card.style.setProperty('--r1', slot.r1);

  // Anchor at top-left of scene
  card.style.top  = '0';
  card.style.left = '0';

  card.innerHTML = `
    <div class="card-icon">${cardData.icon}</div>
    <div class="card-name">${cardData.name}</div>
    <div class="card-bar"></div>
  `;

  cardStage.appendChild(card);

  setTimeout(() => {
    card.classList.add('dropping');

    // Light dot
    setTimeout(() => {
      dotEls[index].classList.add('lit');
    }, 350);

    // Last card triggers bounce + reveal
    if (index === CARDS.length - 1) {
      setTimeout(onAllLanded, 580);
    }
  }, slot.delay + 500);
}

function onAllLanded() {
  const truckFront = document.getElementById('truckFront');
  truck.classList.add('bouncing');
  truckFront?.classList.add('bouncing');
  truck.addEventListener('animationend', () => {
    truck.classList.remove('bouncing');
    truckFront?.classList.remove('bouncing');
    setTimeout(() => tagline.classList.add('show'), 180);
    setTimeout(() => enterBtn.classList.add('show'), 660);
  }, { once: true });
}

// ── INIT ──────────────────────────────────────────────────────────────────
// Wait for truck image to load so we have correct dimensions
truck.onload = () => {
  // Clone truck as a front overlay — clipped to truck body only (below opening).
  // Sits above the card layer (z-index 30) so cards vanish into the clapperboard mouth.
  const truckFront = truck.cloneNode();
  truckFront.id = 'truckFront';
  truckFront.className = 'truck-front';
  truckFront.removeAttribute('onload');
  scene.appendChild(truckFront);

  setTimeout(() => {
    dotsWrap.classList.add('show');
    CARDS.forEach((c, i) => spawnCard(c, SLOTS[i], i));
  }, 600);
};
// Fallback if already cached
if (truck.complete) truck.onload();

// ── LAUNCH ────────────────────────────────────────────────────────────────
enterBtn.addEventListener('click', (e) => {
  e.preventDefault();
  const preloader = document.getElementById('preloader');
  const appFrame  = document.getElementById('app-frame');
  preloader.classList.add('fade-out');
  appFrame.classList.add('show');
  setTimeout(() => preloader.style.display = 'none', 950);
});
</script>
